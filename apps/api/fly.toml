# fly.toml app configuration file generated for mitate-api on 2026-03-26T22:05:03+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mitate-api'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_PATH = '/data/mitate.db'
  NODE_ENV = 'production'
  PORT = '3001'

[[mounts]]
  source = 'mitate_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
