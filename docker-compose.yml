version: '3.8'

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: anvil
    command:
      - "--host"
      - "0.0.0.0"
      - "--chain-id"
      - "31337"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env
    environment:
      - DATABASE_PATH=/data/senq.db
      - EVM_RPC_URL=http://anvil:8545
      - EVM_CHAIN_ID=31337
    volumes:
      - api-data:/data
      - ./apps/api/src:/app/src:ro
    depends_on:
      anvil:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3001/health'); if (!r.ok) process.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api-data:
